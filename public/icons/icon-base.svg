<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedSquare)">
    <!-- Background seda -->
    <rect width="512" height="512" fill="#ddd5c7"/>

    <!-- FELICE — large, café, spaced, top area -->
    <text x="256" y="108" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#322b29" letter-spacing="14" font-weight="400">FELICE</text>

    <!-- Thin gold separator line -->
    <line x1="156" y1="128" x2="356" y2="128" stroke="#c29863" stroke-width="1.2" opacity=".6"/>

    <!-- Triquetra symbol — large, centered, vinho -->
    <g transform="translate(256,278)">
      <!-- Leaf 1 — top -->
      <path d="M0,-110 C30,-68 40,-26 0,0 C-40,-26 -30,-68 0,-110Z" fill="none" stroke="#663739" stroke-width="3.8"/>
      <!-- Leaf 2 — lower-right -->
      <path d="M0,-110 C30,-68 40,-26 0,0 C-40,-26 -30,-68 0,-110Z" fill="none" stroke="#663739" stroke-width="3.8" transform="rotate(120)"/>
      <!-- Leaf 3 — lower-left -->
      <path d="M0,-110 C30,-68 40,-26 0,0 C-40,-26 -30,-68 0,-110Z" fill="none" stroke="#663739" stroke-width="3.8" transform="rotate(240)"/>
      <!-- Central dot — dourado -->
      <circle r="8" fill="#c29863"/>
    </g>

    <!-- WELLNESS — large, vinho, bottom area -->
    <text x="256" y="462" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" fill="#663739" letter-spacing="8" font-weight="400">WELLNESS</text>
  </g>
</svg>
