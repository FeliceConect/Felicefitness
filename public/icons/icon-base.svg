<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedSquare)">
    <!-- Background café -->
    <rect width="512" height="512" fill="#322b29"/>

    <!-- Outer decorative ring -->
    <circle cx="256" cy="256" r="225" fill="none" stroke="#c29863" stroke-width="2.3" opacity=".45"/>
    <!-- Inner ring -->
    <circle cx="256" cy="256" r="210" fill="none" stroke="#c29863" stroke-width="1" opacity=".25"/>

    <!-- Triquetra symbol — centred -->
    <g transform="translate(256,256)">
      <!-- Leaf 1 — top -->
      <path d="M0,-92 C26,-56 33,-23 0,0 C-33,-23 -26,-56 0,-92Z" fill="none" stroke="#c29863" stroke-width="2.8"/>
      <!-- Leaf 2 — lower-right -->
      <path d="M0,-92 C26,-56 33,-23 0,0 C-33,-23 -26,-56 0,-92Z" fill="none" stroke="#c29863" stroke-width="2.8" transform="rotate(120)"/>
      <!-- Leaf 3 — lower-left -->
      <path d="M0,-92 C26,-56 33,-23 0,0 C-33,-23 -26,-56 0,-92Z" fill="none" stroke="#c29863" stroke-width="2.8" transform="rotate(240)"/>
      <!-- Central dot -->
      <circle r="7" fill="#c29863" opacity=".9"/>
      <!-- Apex rays -->
      <line x1="0" y1="-102" x2="0" y2="-120" stroke="#c29863" stroke-width="1.8" stroke-linecap="round" opacity=".45"/>
      <line x1="0" y1="-102" x2="0" y2="-120" stroke="#c29863" stroke-width="1.8" stroke-linecap="round" opacity=".45" transform="rotate(120)"/>
      <line x1="0" y1="-102" x2="0" y2="-120" stroke="#c29863" stroke-width="1.8" stroke-linecap="round" opacity=".45" transform="rotate(240)"/>
    </g>
  </g>
</svg>
