<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#322b29"/>
  <!-- Outer decorative ring -->
  <circle cx="200" cy="200" r="176" fill="none" stroke="#c29863" stroke-width="1.2" opacity=".45"/>
  <!-- Inner ring -->
  <circle cx="200" cy="200" r="164" fill="none" stroke="#c29863" stroke-width=".6" opacity=".25"/>
  <!-- FELICE — above symbol, clear of leaves -->
  <text x="200" y="106" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#ae9b89" letter-spacing="9" font-weight="400">FELICE</text>
  <!-- Triquetra symbol — centred at 200,202 -->
  <g transform="translate(200,202)">
    <!-- Leaf 1 — top -->
    <path d="M0,-72 C20,-44 26,-18 0,0 C-26,-18 -20,-44 0,-72Z" fill="none" stroke="#c29863" stroke-width="1.8"/>
    <!-- Leaf 2 — lower-right -->
    <path d="M0,-72 C20,-44 26,-18 0,0 C-26,-18 -20,-44 0,-72Z" fill="none" stroke="#c29863" stroke-width="1.8" transform="rotate(120)"/>
    <!-- Leaf 3 — lower-left -->
    <path d="M0,-72 C20,-44 26,-18 0,0 C-26,-18 -20,-44 0,-72Z" fill="none" stroke="#c29863" stroke-width="1.8" transform="rotate(240)"/>
    <!-- Central dot -->
    <circle r="5.6" fill="#c29863" opacity=".9"/>
    <!-- Apex rays -->
    <line x1="0" y1="-80" x2="0" y2="-94" stroke="#c29863" stroke-width="1.2" stroke-linecap="round" opacity=".45"/>
    <line x1="0" y1="-80" x2="0" y2="-94" stroke="#c29863" stroke-width="1.2" stroke-linecap="round" opacity=".45" transform="rotate(120)"/>
    <line x1="0" y1="-80" x2="0" y2="-94" stroke="#c29863" stroke-width="1.2" stroke-linecap="round" opacity=".45" transform="rotate(240)"/>
  </g>
  <!-- WELLNESS — below symbol -->
  <text x="200" y="280" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#c29863" letter-spacing="8" font-weight="300">WELLNESS</text>

</svg>
